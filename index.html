<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://store-images.s-microsoft.com/image/apps.7973.14208673485779370.88f23073-7e41-4921-aef9-76103983bd31.9d2f4ec1-724a-4efd-8a3b-1068ecdd2513" alt="Snapchat Logo">
    </div>
    <h1>Log in to Snapchat</h1>
    <input type="text" placeholder="Username or Email">
    <a href="#" class="alt-login">Use phone number instead</a>
    <button class="next">Next</button>

    <div class="divider">
      <span>OR</span>
    </div>

    <button class="google">Continue with Google</button>

    <p class="signup">New to Snapchat? <a href="#">Sign Up</a></p>
  </div>

  <footer>
    <div class="footer-links">
      <div>
        <h4>Company</h4>
        <a href="#">Snap Inc.</a>
        <a href="#">Careers</a>
      </div>
      <div>
        <h4>Community</h4>
        <a href="#">Support</a>
      </div>
      <div>
        <h4>Advertising</h4>
        <a href="#">Buy Ads</a>
      </div>
      <div>
        <h4>Legal</h4>
        <a href="#">Privacy Center</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
    <div class="language">English (US)</div>
  </footer>
</body>
</html>
